<div style="max-width: 500px; margin: 0 auto; padding: 20px; font-family: Arial, sans-serif;">
  <h1 style="text-align: center; color: #333;">Mi lista</h1>

  <div style="display: flex; gap: 10px; margin-bottom: 20px;">
    <input 
      type="text"
      [(ngModel)]="task"
      placeholder="Ingresa una tarea..."
      style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px;">
    <button (click)="addTask()" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
      + Agregar
    </button>
  </div>

  <ul style="list-style: none; padding: 0;">
    <li *ngFor="let tarea of tareas" style="display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee;">
      <span>{{ tarea }}</span>
      <button (click)="eliminarTarea(tarea)" style="background: none; border: none; cursor: pointer; color: #ff4444; font-size: 18px;">🗑️</button>
    </li>
  </ul>
</div>
